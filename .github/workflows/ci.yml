name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python quality and package integrity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Type check
        run: mypy

      - name: Unit tests
        run: pytest

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel contents
        run: python scripts/verify_wheel.py dist/secscan-*.whl

      - name: Verify clean wheel installation
        run: |
          python -m venv /tmp/secscan-wheel-test
          /tmp/secscan-wheel-test/bin/pip install dist/secscan-*.whl
          /tmp/secscan-wheel-test/bin/python -c "import secscan, secscan.cli, secscan.models, secscan.normalize, secscan.policy, secscan.report, secscan.trivy, secscan.scanners, secscan.scanners.base, secscan.scanners.registry, secscan.scanners.image, secscan.scanners.filesystem"
          /tmp/secscan-wheel-test/bin/secscan --version

  container:
    name: Container build and smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build image
        run: docker build --no-cache --progress=plain -t secscan:ci .

      - name: Verify CLI startup
        run: docker run --rm secscan:ci --version

      - name: Export image for scanning
        run: docker save secscan:ci --output /tmp/secscan-ci.tar

      - name: Scan secscan image
        run: |
          mkdir -p /tmp/trivy-cache
          docker run --rm \
            -v /tmp/secscan-ci.tar:/scan/secscan-ci.tar:ro \
            -v /tmp/trivy-cache:/root/.cache/ \
            aquasec/trivy:0.70.0 image \
            --input /scan/secscan-ci.tar \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL
